_schema-version: "3.1"
ID: cap-serv-notif
description: CAP service for S/4HANA Maintenance Notifications
version: 1.0.0

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
        - cp -r app gen/srv/app
        - find gen/srv/app -name '*.cds' -delete

modules:
  - name: cap-serv-notif-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
      routes:
        - route: cap-service-notif-app.${default-domain}
    requires:
      - name: cxb400-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

resources:
  - name: cxb400-destination
    type: org.cloudfoundry.existing-service
    parameters:
      service: destination